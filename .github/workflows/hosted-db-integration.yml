name: Hosted PostgreSQL integration

on:
  pull_request:
    paths:
      - ".github/workflows/hosted-db-integration.yml"
      - "package.json"
      - "bun.lock"
      - "prisma/hosted/**"
      - "scripts/generate-hosted-prisma.mjs"
      - "scripts/test-hosted-db.mjs"
      - "src/lib/jobs/prisma-hosted-job-store.ts"
      - "src/lib/jobs/prisma-hosted-job-store.integration.test.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosted-db-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosted-db:
    name: PostgreSQL persistence and tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: purr_verify
          POSTGRES_PASSWORD: purr_verify_test
          POSTGRES_DB: purr_verify_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U purr_verify -d purr_verify_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      DATABASE_URL: postgresql://purr_verify:purr_verify_test@127.0.0.1:5432/purr_verify_test?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run hosted database integration
        run: bun run test:hosted-db
