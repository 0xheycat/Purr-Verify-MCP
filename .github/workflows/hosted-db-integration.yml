name: Hosted PostgreSQL integration

on:
  pull_request:
    paths:
      - ".github/workflows/hosted-db-integration.yml"
      - "package.json"
      - "bun.lock"
      - "prisma/hosted/**"
      - "scripts/generate-hosted-prisma.mjs"
      - "scripts/test-hosted-db.mjs"
      - "src/lib/jobs/prisma-hosted-job-store.ts"
      - "src/lib/jobs/prisma-hosted-job-store.integration.test.ts"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hosted-db-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hosted-db:
    name: PostgreSQL persistence and tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      DATABASE_URL: postgresql://purr_verify:purr_verify_test@127.0.0.1:5432/purr_verify_test?schema=public
      POSTGRES_CONTAINER: purr-verify-postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start disposable PostgreSQL
        run: |
          set -euo pipefail
          docker run --detach \
            --name "$POSTGRES_CONTAINER" \
            --publish 5432:5432 \
            --env POSTGRES_USER=purr_verify \
            --env POSTGRES_PASSWORD=purr_verify_test \
            --env POSTGRES_DB=purr_verify_test \
            postgres:16-alpine

          for attempt in $(seq 1 30); do
            if docker exec "$POSTGRES_CONTAINER" pg_isready -U purr_verify -d purr_verify_test; then
              exit 0
            fi

            if ! docker inspect --format '{{.State.Running}}' "$POSTGRES_CONTAINER" | grep -qx true; then
              docker logs "$POSTGRES_CONTAINER"
              exit 1
            fi

            sleep 2
          done

          docker logs "$POSTGRES_CONTAINER"
          exit 1

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run hosted database integration
        run: bun run test:hosted-db

      - name: Stop disposable PostgreSQL
        if: always()
        run: docker rm --force "$POSTGRES_CONTAINER" || true
